name: 🔄 自动同步上游仓库 / Auto Sync Fork

on:
  schedule:
    # ⏱️ 定时任务：每周一的凌晨 0:00 (UTC 时间) 自动运行，相当于北京时间周一早上 8:00
    - cron: '0 0 * * 1'
  
  # 💡 允许你在 GitHub 网页端随时手动点击 "Run workflow" 强制同步
  workflow_dispatch: 

jobs:
  sync-upstream:
    name: 🔄 拉取并合并上游代码
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 检出代码仓库 / Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取完整的历史记录，否则同步会报错

      - name: 🔄 同步上游代码 / Sync Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          # ⚠️【请修改这里】改成原作者的 GitHub 用户名/仓库名
          upstream_repository: maillab/cloud-mail   
          upstream_branch: main                       # 原作者的主分支名（通常是 main）
          target_branch: main                         # 你自己的主分支名
          test_mode: false                            # 设置为 false 才会真正写入并推送代码
